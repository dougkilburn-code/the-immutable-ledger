<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#0d1117"/>

  <!-- Grid lines background -->
  <g stroke="#1a2030" stroke-width="1" opacity="0.6">
    <line x1="0" y1="60" x2="820" y2="60"/>
    <line x1="0" y1="120" x2="820" y2="120"/>
    <line x1="0" y1="180" x2="820" y2="180"/>
    <line x1="0" y1="240" x2="820" y2="240"/>
    <line x1="0" y1="300" x2="820" y2="300"/>
    <line x1="0" y1="360" x2="820" y2="360"/>
    <line x1="0" y1="420" x2="820" y2="420"/>
    <line x1="100" y1="0" x2="100" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="500" y1="0" x2="500" y2="480"/>
    <line x1="600" y1="0" x2="600" y2="480"/>
    <line x1="700" y1="0" x2="700" y2="480"/>
  </g>

  <!-- Transaction flow diagram -->
  <!-- Node: Merchant -->
  <rect x="40" y="200" width="120" height="60" fill="#1e2940" stroke="#3a5a8a" stroke-width="1.5" rx="6"/>
  <text x="100" y="225" font-family="monospace" font-size="10" fill="#8ab8d8" text-anchor="middle">MERCHANT</text>
  <text x="100" y="240" font-family="monospace" font-size="8" fill="#4a8ab8" text-anchor="middle">TERMINAL</text>
  <circle cx="100" cy="252" r="3" fill="#00cc44"/>

  <!-- Arrow 1: merchant to gateway -->
  <line x1="162" y1="230" x2="218" y2="230" stroke="#3a7a5a" stroke-width="2"/>
  <polygon points="218,225 228,230 218,235" fill="#3a7a5a"/>
  <text x="193" y="222" font-family="monospace" font-size="7" fill="#3a7a5a" text-anchor="middle">AUTH</text>

  <!-- Node: Payment Gateway -->
  <rect x="230" y="200" width="130" height="60" fill="#1e3020" stroke="#3a7a5a" stroke-width="1.5" rx="6"/>
  <text x="295" y="225" font-family="monospace" font-size="10" fill="#8ad8b8" text-anchor="middle">GATEWAY</text>
  <text x="295" y="240" font-family="monospace" font-size="8" fill="#4ab888" text-anchor="middle">v2.4.1-legacy</text>
  <circle cx="295" cy="252" r="3" fill="#ffaa00"/>

  <!-- Arrow 2: gateway to acquirer -->
  <line x1="362" y1="230" x2="418" y2="230" stroke="#5a3a8a" stroke-width="2"/>
  <polygon points="418,225 428,230 418,235" fill="#5a3a8a"/>
  <text x="393" y="222" font-family="monospace" font-size="7" fill="#5a3a8a" text-anchor="middle">ISO 8583</text>

  <!-- Node: Acquirer -->
  <rect x="430" y="200" width="130" height="60" fill="#1e1a30" stroke="#5a3a8a" stroke-width="1.5" rx="6"/>
  <text x="495" y="225" font-family="monospace" font-size="10" fill="#a898d8" text-anchor="middle">ACQUIRER</text>
  <text x="495" y="240" font-family="monospace" font-size="8" fill="#6858b8" text-anchor="middle">BANK</text>
  <circle cx="495" cy="252" r="3" fill="#00cc44"/>

  <!-- Arrow 3: acquirer to scheme -->
  <line x1="562" y1="230" x2="618" y2="230" stroke="#8a5a3a" stroke-width="2"/>
  <polygon points="618,225 628,230 618,235" fill="#8a5a3a"/>
  <text x="593" y="222" font-family="monospace" font-size="7" fill="#8a5a3a" text-anchor="middle">SCHEME</text>

  <!-- Node: Card Scheme -->
  <rect x="630" y="200" width="130" height="60" fill="#2a1a10" stroke="#8a5a3a" stroke-width="1.5" rx="6"/>
  <text x="695" y="225" font-family="monospace" font-size="10" fill="#d8a888" text-anchor="middle">SCHEME</text>
  <text x="695" y="240" font-family="monospace" font-size="8" fill="#a87848" text-anchor="middle">PROCESSING</text>
  <circle cx="695" cy="252" r="3" fill="#00cc44"/>

  <!-- Return path (below) — dashed -->
  <line x1="695" y1="264" x2="695" y2="310" stroke="#8a5a3a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="695" y1="310" x2="100" y2="310" stroke="#8a5a3a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="100" y1="310" x2="100" y2="264" stroke="#8a5a3a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="410" y="326" font-family="monospace" font-size="8" fill="#6a4a2a" text-anchor="middle">AUTHORISATION RESPONSE — 280ms</text>

  <!-- ISO 20022 badge -->
  <rect x="330" y="120" width="160" height="50" fill="#1e2940" stroke="#4a6a9a" stroke-width="1" rx="4"/>
  <text x="410" y="140" font-family="monospace" font-size="11" fill="#6a9ad8" text-anchor="middle" font-weight="bold">ISO 20022</text>
  <text x="410" y="158" font-family="monospace" font-size="8" fill="#3a6a9a" text-anchor="middle">MIGRATION: IN PROGRESS</text>
  <text x="410" y="170" font-family="monospace" font-size="7" fill="#2a4a7a" text-anchor="middle">(target: 2027, probably)</text>

  <!-- NPP logo suggestion -->
  <rect x="40" y="360" width="200" height="50" fill="#1e3020" stroke="#3a7a5a" stroke-width="1" rx="4"/>
  <text x="140" y="380" font-family="monospace" font-size="10" fill="#6ad8a8" text-anchor="middle">NPP REAL-TIME</text>
  <text x="140" y="394" font-family="monospace" font-size="8" fill="#3a9a68" text-anchor="middle">0.3s · 24/7/365</text>
  <circle cx="60" cy="387" r="6" fill="#00cc44" opacity="0.8"/>

  <!-- BECS label -->
  <rect x="260" y="360" width="200" height="50" fill="#2a2018" stroke="#7a6a3a" stroke-width="1" rx="4"/>
  <text x="360" y="380" font-family="monospace" font-size="10" fill="#d8c888" text-anchor="middle">BECS LEGACY</text>
  <text x="360" y="394" font-family="monospace" font-size="8" fill="#9a8848" text-anchor="middle">3 DAYS · WEEKDAYS ONLY</text>
  <circle cx="280" cy="387" r="6" fill="#ffaa00" opacity="0.8"/>

  <!-- Real-time ticker across top -->
  <rect x="0" y="0" width="820" height="28" fill="#0a0e14"/>
  <text x="20" y="19" font-family="monospace" font-size="9" fill="#3a8a5a">TXN/s: 1,247  </text>
  <text x="170" y="19" font-family="monospace" font-size="9" fill="#8a6a3a">LATENCY: 280ms  </text>
  <text x="340" y="19" font-family="monospace" font-size="9" fill="#3a6a9a">SCHEME FEE: 1.5%  </text>
  <text x="520" y="19" font-family="monospace" font-size="9" fill="#3a8a5a">UPTIME: 99.97%  </text>
  <text x="680" y="19" font-family="monospace" font-size="9" fill="#8a3a3a">OUTAGES: 2</text>

  <!-- Caption bar -->
  <rect x="0" y="432" width="820" height="48" fill="#0d1117" opacity="0.95"/>
  <text x="410" y="461" font-family="Georgia, serif" font-size="13" fill="#8ab8d8" text-anchor="middle" font-style="italic">The payments stack. Simple, reliable, unchanged since 1974.</text>
</svg>
