<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#f5f0e8"/>

  <!-- BNPL debt spiral diagram — satirical infographic style -->

  <!-- Title -->
  <text x="410" y="50" font-family="Georgia, serif" font-size="22" fill="#272727" text-anchor="middle" font-weight="bold">HOW IT WORKS</text>
  <text x="410" y="68" font-family="Georgia, serif" font-size="11" fill="#8a7858" text-anchor="middle" font-style="italic">Buy Now, Pay Later — A Consumer Education Guide</text>
  <line x1="100" y1="78" x2="720" y2="78" stroke="#d4c9b0" stroke-width="1.5"/>

  <!-- Step 1 box -->
  <rect x="30" y="100" width="160" height="100" fill="#e8e2d8" stroke="#c8bda4" stroke-width="1" rx="4"/>
  <rect x="30" y="100" width="160" height="24" fill="#272727" rx="4 4 0 0"/>
  <text x="110" y="116" font-family="monospace" font-size="10" fill="#f5f0e8" text-anchor="middle" font-weight="bold">STEP 1</text>
  <text x="110" y="142" font-family="Georgia, serif" font-size="11" fill="#272727" text-anchor="middle">Buy the thing</text>
  <text x="110" y="158" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">you cannot afford</text>
  <text x="110" y="176" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">with money you</text>
  <text x="110" y="192" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">do not have</text>

  <!-- Arrow 1→2 -->
  <line x1="192" y1="150" x2="248" y2="150" stroke="#272727" stroke-width="2"/>
  <polygon points="248,144 260,150 248,156" fill="#272727"/>

  <!-- Step 2 box -->
  <rect x="262" y="100" width="160" height="100" fill="#e8e2d8" stroke="#c8bda4" stroke-width="1" rx="4"/>
  <rect x="262" y="100" width="160" height="24" fill="#272727" rx="4 4 0 0"/>
  <text x="342" y="116" font-family="monospace" font-size="10" fill="#f5f0e8" text-anchor="middle" font-weight="bold">STEP 2</text>
  <text x="342" y="142" font-family="Georgia, serif" font-size="11" fill="#272727" text-anchor="middle">Split into 4</text>
  <text x="342" y="158" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">"easy" payments</text>
  <text x="342" y="174" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">of $37.50</text>
  <text x="342" y="192" font-family="Georgia, serif" font-size="8" fill="#8a7858" text-anchor="middle" font-style="italic">(feels like less)</text>

  <!-- Arrow 2→3 -->
  <line x1="424" y1="150" x2="480" y2="150" stroke="#272727" stroke-width="2"/>
  <polygon points="480,144 492,150 480,156" fill="#272727"/>

  <!-- Step 3 box -->
  <rect x="494" y="100" width="160" height="100" fill="#e8e2d8" stroke="#c8bda4" stroke-width="1" rx="4"/>
  <rect x="494" y="100" width="160" height="24" fill="#272727" rx="4 4 0 0"/>
  <text x="574" y="116" font-family="monospace" font-size="10" fill="#f5f0e8" text-anchor="middle" font-weight="bold">STEP 3</text>
  <text x="574" y="142" font-family="Georgia, serif" font-size="11" fill="#272727" text-anchor="middle">Miss a payment</text>
  <text x="574" y="158" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">due to ZipPay</text>
  <text x="574" y="174" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">repayment for</text>
  <text x="574" y="192" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">previous ZipPay</text>

  <!-- Arrow 3→4 down then across -->
  <line x1="574" y1="202" x2="574" y2="248" stroke="#272727" stroke-width="2"/>
  <line x1="574" y1="248" x2="110" y2="248" stroke="#272727" stroke-width="2"/>
  <polygon points="116,242 104,248 116,254" fill="#272727"/>

  <!-- Step 4 box — back to start, closing the loop -->
  <rect x="30" y="260" width="160" height="100" fill="#e8e2d8" stroke="#cc2222" stroke-width="1.5" rx="4"/>
  <rect x="30" y="260" width="160" height="24" fill="#cc2222" rx="4 4 0 0"/>
  <text x="110" y="276" font-family="monospace" font-size="10" fill="#f5f0e8" text-anchor="middle" font-weight="bold">STEP 4</text>
  <text x="110" y="302" font-family="Georgia, serif" font-size="11" fill="#272727" text-anchor="middle">Late fee applied</text>
  <text x="110" y="318" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">Cost now exceeds</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="9" fill="#6a5840" text-anchor="middle">original item</text>
  <text x="110" y="350" font-family="monospace" font-size="7" fill="#cc2222" text-anchor="middle">RETURN TO STEP 1</text>

  <!-- Product being purchased — in the right section -->
  <rect x="440" y="260" width="340" height="160" fill="#fff" stroke="#e0dbd4" stroke-width="1" rx="4"/>
  <!-- Product image placeholder -->
  <rect x="450" y="270" width="100" height="100" fill="#e8e2d8" rx="3"/>
  <!-- Product sketch: shoes or bag -->
  <ellipse cx="500" cy="325" rx="35" ry="25" fill="#c8bda4"/>
  <rect x="468" y="308" width="64" height="20" fill="#b8ad90" rx="3"/>
  <rect x="478" y="302" width="44" height="10" fill="#a89870" rx="2"/>
  <text x="500" y="340" font-family="monospace" font-size="7" fill="#8a7858" text-anchor="middle">shoes</text>
  <!-- Product details -->
  <text x="580" y="292" font-family="Georgia, serif" font-size="13" fill="#272727">Designer Trainers</text>
  <text x="580" y="310" font-family="monospace" font-size="11" fill="#272727">$149.00</text>
  <text x="580" y="326" font-family="monospace" font-size="9" fill="#5a8a5a">or 4 × $37.25</text>
  <text x="580" y="342" font-family="monospace" font-size="8" fill="#8a7858">interest free*</text>
  <!-- Stars -->
  <text x="580" y="358" font-family="monospace" font-size="11" fill="#c8a828">★★★★★</text>
  <text x="580" y="374" font-family="monospace" font-size="7" fill="#8a7858">*late fees, credit checks apply</text>
  <text x="580" y="386" font-family="monospace" font-size="7" fill="#8a7858">see 47-page T&amp;Cs</text>
  <!-- BUY NOW button -->
  <rect x="555" y="392" width="200" height="24" fill="#272727" rx="3"/>
  <text x="655" y="408" font-family="monospace" font-size="10" fill="#f5f0e8" text-anchor="middle">BUY NOW, WORRY LATER</text>

  <!-- Caption bar -->
  <rect x="0" y="432" width="820" height="48" fill="#272727" opacity="0.88"/>
  <text x="410" y="461" font-family="Georgia, serif" font-size="13" fill="#f5f0e8" opacity="0.85" text-anchor="middle" font-style="italic">ZipPay announces new product to help customers afford repayments on previous ZipPay products.</text>
</svg>
