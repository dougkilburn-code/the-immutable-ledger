<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#f5f0e8"/>

  <!-- Large payment terminal — centre stage -->
  <!-- Terminal body -->
  <rect x="260" y="80" width="300" height="300" fill="#272727" rx="16"/>
  <rect x="268" y="88" width="284" height="284" fill="#1a1a1a" rx="12"/>

  <!-- Screen -->
  <rect x="280" y="100" width="260" height="150" fill="#1e3a5a" rx="4"/>
  <rect x="284" y="104" width="252" height="142" fill="#16304e" rx="3"/>

  <!-- Screen content: price display -->
  <text x="410" y="148" font-family="monospace" font-size="40" fill="#f5f0e8" text-anchor="middle" font-weight="bold">$2.95</text>
  <text x="410" y="168" font-family="monospace" font-size="10" fill="#8ab8d8" text-anchor="middle">SURCHARGE: $0.00</text>
  <text x="410" y="183" font-family="monospace" font-size="8" fill="#5a8ab8" text-anchor="middle">( REPLACED BY: SERVICE FEE $1.50 )</text>
  <text x="410" y="198" font-family="monospace" font-size="8" fill="#5a8ab8" text-anchor="middle">( CONNECTIVITY FEE $0.80 )</text>
  <text x="410" y="213" font-family="monospace" font-size="8" fill="#5a8ab8" text-anchor="middle">( TERMINAL FACILITATION FEE $0.65 )</text>
  <text x="410" y="230" font-family="monospace" font-size="10" fill="#f7b731" text-anchor="middle">TOTAL: $5.90</text>

  <!-- Contactless zone -->
  <rect x="280" y="258" width="260" height="80" fill="#111" rx="3"/>
  <!-- Contactless symbol -->
  <path d="M390,298 Q404,284 390,270" fill="none" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
  <path d="M400,304 Q418,286 400,268" fill="none" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
  <path d="M410,310 Q432,288 410,266" fill="none" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
  <path d="M420,316 Q446,290 420,264" fill="none" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
  <circle cx="382" cy="298" r="4" fill="#f5f0e8"/>
  <text x="410" y="346" font-family="monospace" font-size="9" fill="#8ab8d8" text-anchor="middle">TAP · INSERT · WEEP</text>

  <!-- Keypad -->
  <rect x="280" y="344" width="260" height="24" fill="#0d0d0d" rx="2"/>
  <text x="310" y="360" font-family="monospace" font-size="9" fill="#5a8a5a">CANCEL</text>
  <text x="410" y="360" font-family="monospace" font-size="9" fill="#8a8a5a" text-anchor="middle">CLEAR</text>
  <text x="516" y="360" font-family="monospace" font-size="9" fill="#5a8a5a" text-anchor="right">ENTER</text>

  <!-- Receipt tape coming out of bottom -->
  <rect x="372" y="380" width="76" height="50" fill="#f5f0e8" stroke="#c8bda4" stroke-width="1"/>
  <!-- Receipt text -->
  <text x="410" y="395" font-family="monospace" font-size="7" fill="#272727" text-anchor="middle">**** RECEIPT ****</text>
  <text x="410" y="404" font-family="monospace" font-size="6" fill="#272727" text-anchor="middle">Surcharge: BANNED</text>
  <text x="410" y="413" font-family="monospace" font-size="6" fill="#272727" text-anchor="middle">New Fee: $2.95</text>
  <text x="410" y="422" font-family="monospace" font-size="6" fill="#272727" text-anchor="middle">Name: Different</text>

  <!-- Cards floating around terminal -->
  <!-- Left card -->
  <rect x="60" y="180" width="140" height="88" fill="#2c3e7a" rx="8"/>
  <rect x="68" y="196" width="40" height="28" fill="#c8b88a" rx="3"/>
  <!-- Chip on card -->
  <rect x="72" y="200" width="32" height="20" fill="#b8a870" rx="2"/>
  <line x1="80" y1="200" x2="80" y2="220" stroke="#c8b88a" stroke-width="0.5"/>
  <line x1="88" y1="200" x2="88" y2="220" stroke="#c8b88a" stroke-width="0.5"/>
  <line x1="96" y1="200" x2="96" y2="220" stroke="#c8b88a" stroke-width="0.5"/>
  <text x="130" y="245" font-family="monospace" font-size="8" fill="#f5f0e8" text-anchor="middle">DEBIT</text>
  <text x="100" y="258" font-family="monospace" font-size="7" fill="#a8b8d8">4111 1111 1111 1111</text>
  <!-- Sticker on card: SURCHARGE FREE -->
  <rect x="88" y="228" width="90" height="14" fill="#cc2222" rx="2"/>
  <text x="133" y="239" font-family="monospace" font-size="6" fill="#f5f0e8" text-anchor="middle">SURCHARGE-FREE*</text>

  <!-- Right card -->
  <rect x="620" y="200" width="140" height="88" fill="#1a4a2a" rx="8"/>
  <rect x="628" y="214" width="40" height="28" fill="#c8b88a" rx="3"/>
  <text x="690" y="265" font-family="monospace" font-size="7" fill="#a8c8a8">4222 2222 2222 2222</text>
  <text x="690" y="278" font-family="monospace" font-size="8" fill="#f5f0e8" text-anchor="middle">CREDIT</text>
  <!-- Small asterisk footnote bottom of card -->
  <text x="628" y="282" font-family="monospace" font-size="5" fill="#5a8a5a">*See fee schedule (22 pages)</text>

  <!-- Bank note on desk for irony -->
  <rect x="60" y="320" width="180" height="80" fill="#4a6a3a" rx="4"/>
  <rect x="66" y="326" width="168" height="68" fill="#5a7a48" rx="3" stroke="#3a5a28" stroke-width="1"/>
  <circle cx="150" cy="360" r="25" fill="none" stroke="#c8d8a8" stroke-width="1.5" opacity="0.5"/>
  <text x="150" y="352" font-family="serif" font-size="18" fill="#c8d8a8" text-anchor="middle" opacity="0.6" font-weight="bold">$</text>
  <text x="150" y="366" font-family="monospace" font-size="9" fill="#c8d8a8" text-anchor="middle" opacity="0.5">CASH</text>
  <text x="150" y="396" font-family="monospace" font-size="7" fill="#8ab888" text-anchor="middle">NO SURCHARGE</text>
  <text x="150" y="406" font-family="monospace" font-size="7" fill="#8ab888" text-anchor="middle">NO FEE</text>
  <text x="150" y="416" font-family="monospace" font-size="7" fill="#8ab888" text-anchor="middle">NO SERVICE</text>

  <!-- Caption bar -->
  <rect x="0" y="432" width="820" height="48" fill="#272727" opacity="0.88"/>
  <text x="410" y="461" font-family="Georgia, serif" font-size="13" fill="#f5f0e8" opacity="0.85" text-anchor="middle" font-style="italic">The surcharge has been banned. The terminal confirms this. The total has increased.</text>
</svg>
