<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#272727"/>

  <!-- Vault door — large, imposing -->
  <!-- Vault frame / wall -->
  <rect x="120" y="40" width="400" height="400" fill="#1a1a1a" rx="4"/>
  <rect x="124" y="44" width="392" height="392" fill="#222" rx="3"/>

  <!-- Vault door itself -->
  <circle cx="320" cy="240" r="175" fill="#3a3226"/>
  <circle cx="320" cy="240" r="170" fill="#4a4238" stroke="#5a5244" stroke-width="2"/>
  <!-- Vault door inner ring -->
  <circle cx="320" cy="240" r="140" fill="#3e3830" stroke="#6a6254" stroke-width="3"/>
  <circle cx="320" cy="240" r="115" fill="#2e2820" stroke="#5a5244" stroke-width="2"/>

  <!-- Vault door bolts (locking bolts around perimeter) -->
  <rect x="143" y="228" width="34" height="24" fill="#6a5a44" rx="3"/>
  <rect x="463" y="228" width="34" height="24" fill="#6a5a44" rx="3"/>
  <rect x="308" y="63" width="24" height="34" fill="#6a5a44" rx="3"/>
  <rect x="308" y="383" width="24" height="34" fill="#6a5a44" rx="3"/>
  <!-- Diagonal bolts -->
  <rect x="182" y="140" width="28" height="22" fill="#6a5a44" rx="3" transform="rotate(-45 196 151)"/>
  <rect x="424" y="140" width="28" height="22" fill="#6a5a44" rx="3" transform="rotate(45 438 151)"/>
  <rect x="182" y="322" width="28" height="22" fill="#6a5a44" rx="3" transform="rotate(45 196 333)"/>
  <rect x="424" y="322" width="28" height="22" fill="#6a5a44" rx="3" transform="rotate(-45 438 333)"/>

  <!-- Combination dial -->
  <circle cx="320" cy="240" r="55" fill="#2a2420" stroke="#8a7858" stroke-width="3"/>
  <circle cx="320" cy="240" r="48" fill="#1e1a16" stroke="#6a5a44" stroke-width="1.5"/>
  <!-- Dial markings -->
  <line x1="320" y1="192" x2="320" y2="200" stroke="#8a7858" stroke-width="2"/>
  <line x1="320" y1="280" x2="320" y2="288" stroke="#8a7858" stroke-width="2"/>
  <line x1="272" y1="240" x2="280" y2="240" stroke="#8a7858" stroke-width="2"/>
  <line x1="360" y1="240" x2="368" y2="240" stroke="#8a7858" stroke-width="2"/>
  <!-- Dial pointer -->
  <line x1="320" y1="240" x2="320" y2="197" stroke="#c8b88a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="320" cy="240" r="6" fill="#c8b88a"/>

  <!-- Door handle -->
  <rect x="355" y="215" width="60" height="50" fill="#5a4a38" rx="4"/>
  <rect x="363" y="223" width="44" height="34" fill="#3a2a1e" rx="3"/>
  <!-- Handle spoke -->
  <circle cx="385" cy="240" r="14" fill="none" stroke="#8a7858" stroke-width="4"/>
  <line x1="385" y1="226" x2="385" y2="254" stroke="#8a7858" stroke-width="4"/>
  <line x1="371" y1="240" x2="399" y2="240" stroke="#8a7858" stroke-width="4"/>

  <!-- Bitcoin symbol — glowing inside vault -->
  <circle cx="320" cy="240" r="38" fill="#f7931a" opacity="0.12"/>
  <text x="320" y="253" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#f7931a" opacity="0.35" text-anchor="middle">₿</text>

  <!-- Right side: chart / graphs -->
  <rect x="570" y="60" width="210" height="360" fill="#1a1a1a" rx="3"/>
  <rect x="578" y="68" width="194" height="344" fill="#111" rx="2"/>

  <!-- Chart title -->
  <text x="675" y="90" font-family="monospace" font-size="9" fill="#f7931a" text-anchor="middle">BTC / USD</text>

  <!-- Candlestick chart -->
  <!-- Candles going up dramatically then sideways -->
  <rect x="588" y="280" width="8" height="40" fill="#00cc44" opacity="0.8"/>
  <line x1="592" y1="270" x2="592" y2="280" stroke="#00cc44" stroke-width="1"/>
  <line x1="592" y1="320" x2="592" y2="330" stroke="#00cc44" stroke-width="1"/>

  <rect x="602" y="260" width="8" height="50" fill="#00cc44" opacity="0.8"/>
  <line x1="606" y1="248" x2="606" y2="260" stroke="#00cc44" stroke-width="1"/>
  <line x1="606" y1="310" x2="606" y2="322" stroke="#00cc44" stroke-width="1"/>

  <rect x="616" y="220" width="8" height="55" fill="#00cc44" opacity="0.8"/>
  <line x1="620" y1="208" x2="620" y2="220" stroke="#00cc44" stroke-width="1"/>
  <line x1="620" y1="275" x2="620" y2="285" stroke="#00cc44" stroke-width="1"/>

  <rect x="630" y="200" width="8" height="40" fill="#ff3322" opacity="0.8"/>
  <line x1="634" y1="193" x2="634" y2="200" stroke="#ff3322" stroke-width="1"/>
  <line x1="634" y1="240" x2="634" y2="248" stroke="#ff3322" stroke-width="1"/>

  <rect x="644" y="160" width="8" height="55" fill="#00cc44" opacity="0.8"/>
  <line x1="648" y1="148" x2="648" y2="160" stroke="#00cc44" stroke-width="1"/>
  <line x1="648" y1="215" x2="648" y2="225" stroke="#00cc44" stroke-width="1"/>

  <rect x="658" y="140" width="8" height="35" fill="#00cc44" opacity="0.8"/>
  <line x1="662" y1="132" x2="662" y2="140" stroke="#00cc44" stroke-width="1"/>
  <line x1="662" y1="175" x2="662" y2="183" stroke="#00cc44" stroke-width="1"/>

  <rect x="672" y="120" width="8" height="40" fill="#ff3322" opacity="0.8"/>
  <line x1="676" y1="114" x2="676" y2="120" stroke="#ff3322" stroke-width="1"/>
  <line x1="676" y1="160" x2="676" y2="168" stroke="#ff3322" stroke-width="1"/>

  <rect x="686" y="100" width="8" height="35" fill="#00cc44" opacity="0.8"/>
  <line x1="690" y1="94" x2="690" y2="100" stroke="#00cc44" stroke-width="1"/>
  <line x1="690" y1="135" x2="690" y2="143" stroke="#00cc44" stroke-width="1"/>

  <rect x="700" y="104" width="8" height="28" fill="#ff3322" opacity="0.8"/>
  <rect x="714" y="100" width="8" height="32" fill="#00cc44" opacity="0.8"/>
  <rect x="728" y="105" width="8" height="24" fill="#ff3322" opacity="0.8"/>
  <rect x="742" y="102" width="8" height="28" fill="#00cc44" opacity="0.8"/>
  <rect x="756" y="103" width="8" height="26" fill="#ff3322" opacity="0.8"/>

  <!-- Labels -->
  <text x="675" y="340" font-family="monospace" font-size="8" fill="#4a6a8a" text-anchor="middle">NOW INSTITUTIONALLY OWNED</text>
  <text x="675" y="354" font-family="monospace" font-size="8" fill="#4a6a8a" text-anchor="middle">94% BY BANKS</text>

  <!-- Caption bar -->
  <rect x="0" y="432" width="820" height="48" fill="#111" opacity="0.95"/>
  <text x="410" y="461" font-family="Georgia, serif" font-size="13" fill="#c8b88a" text-anchor="middle" font-style="italic">Bitcoin: the future of decentralised finance, now securely held by Goldman Sachs.</text>
</svg>
