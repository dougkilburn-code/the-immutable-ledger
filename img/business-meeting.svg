<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#f5f0e8"/>

  <!-- Room background -->
  <rect x="0" y="0" width="820" height="380" fill="#ece7dc"/>
  <!-- Floor -->
  <rect x="0" y="380" width="820" height="100" fill="#d4c9b0"/>
  <rect x="0" y="378" width="820" height="4" fill="#b8ad98"/>
  <!-- Wall panel lines -->
  <rect x="0" y="0" width="820" height="8" fill="#d4c9b0"/>
  <line x1="0" y1="8" x2="820" y2="8" stroke="#c8bda4" stroke-width="1"/>

  <!-- Window on back wall -->
  <rect x="330" y="20" width="160" height="200" fill="#9ab5c8" opacity="0.35" stroke="#c8bda4" stroke-width="2"/>
  <line x1="410" y1="20" x2="410" y2="220" stroke="#c8bda4" stroke-width="1.5"/>
  <line x1="330" y1="120" x2="490" y2="120" stroke="#c8bda4" stroke-width="1.5"/>
  <!-- Window blinds (partially closed) -->
  <rect x="332" y="22" width="156" height="60" fill="#e8e2d8" opacity="0.6"/>
  <line x1="332" y1="28" x2="488" y2="28" stroke="#d4c9b0" stroke-width="1"/>
  <line x1="332" y1="34" x2="488" y2="34" stroke="#d4c9b0" stroke-width="1"/>
  <line x1="332" y1="40" x2="488" y2="40" stroke="#d4c9b0" stroke-width="1"/>
  <line x1="332" y1="46" x2="488" y2="46" stroke="#d4c9b0" stroke-width="1"/>
  <line x1="332" y1="52" x2="488" y2="52" stroke="#d4c9b0" stroke-width="1"/>
  <line x1="332" y1="58" x2="488" y2="58" stroke="#d4c9b0" stroke-width="1"/>
  <line x1="332" y1="64" x2="488" y2="64" stroke="#d4c9b0" stroke-width="1"/>
  <line x1="332" y1="70" x2="488" y2="70" stroke="#d4c9b0" stroke-width="1"/>
  <line x1="332" y1="76" x2="488" y2="76" stroke="#d4c9b0" stroke-width="1"/>

  <!-- Conference table -->
  <ellipse cx="410" cy="340" rx="360" ry="55" fill="#c8bda4"/>
  <ellipse cx="410" cy="330" rx="360" ry="55" fill="#d4c9b0" stroke="#b8ad98" stroke-width="2"/>
  <rect x="50" y="330" width="720" height="25" fill="#d4c9b0"/>

  <!-- Whiteboard / presentation screen -->
  <rect x="580" y="30" width="220" height="160" fill="#f0ebe0" stroke="#b8ad98" stroke-width="2" rx="2"/>
  <rect x="584" y="34" width="212" height="152" fill="#ece7dc" rx="1"/>
  <!-- Whiteboard content: meaningless framework diagram -->
  <text x="690" y="58" font-family="Georgia, serif" font-size="11" fill="#272727" text-anchor="middle" font-weight="bold">2026 STRATEGY</text>
  <!-- Boxes and arrows on whiteboard -->
  <rect x="598" y="66" width="68" height="28" fill="none" stroke="#8a7858" stroke-width="1.5" rx="2"/>
  <text x="632" y="82" font-family="monospace" font-size="7" fill="#6a5840" text-anchor="middle">TRANSFORM</text>
  <line x1="668" y1="80" x2="696" y2="80" stroke="#8a7858" stroke-width="1"/>
  <polygon points="696,76 704,80 696,84" fill="#8a7858"/>
  <rect x="706" y="66" width="68" height="28" fill="none" stroke="#8a7858" stroke-width="1.5" rx="2"/>
  <text x="740" y="82" font-family="monospace" font-size="7" fill="#6a5840" text-anchor="middle">INNOVATE</text>
  <line x1="690" y1="96" x2="690" y2="118" stroke="#8a7858" stroke-width="1"/>
  <polygon points="686,118 690,128 694,118" fill="#8a7858"/>
  <rect x="650" y="128" width="80" height="28" fill="none" stroke="#8a7858" stroke-width="1.5" rx="2"/>
  <text x="690" y="144" font-family="monospace" font-size="7" fill="#6a5840" text-anchor="middle">DIGITALISE</text>
  <line x1="690" y1="158" x2="690" y2="178" stroke="#8a7858" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="690" y="178" font-family="monospace" font-size="7" fill="#8a7858" text-anchor="middle">[TBD]</text>

  <!-- People seated at table (silhouettes) -->
  <!-- Person 1 — standing, presenting -->
  <ellipse cx="560" cy="245" rx="22" ry="22" fill="#3a3226"/>
  <rect x="542" y="265" width="36" height="45" fill="#272727" rx="3"/>
  <!-- Presenter arm pointing at board -->
  <line x1="578" y1="278" x2="620" y2="260" stroke="#272727" stroke-width="8" stroke-linecap="round"/>

  <!-- Person 2 — seated left -->
  <ellipse cx="180" cy="290" rx="22" ry="22" fill="#9a9488"/>
  <rect x="162" y="310" width="36" height="40" fill="#7a7468" rx="3"/>
  <!-- Person 3 — seated, checking phone -->
  <ellipse cx="280" cy="285" rx="22" ry="22" fill="#9a9488"/>
  <rect x="262" y="305" width="36" height="40" fill="#7a7468" rx="3"/>
  <!-- Phone in hand (looking at it) -->
  <rect x="274" y="298" width="14" height="20" fill="#272727" rx="2"/>
  <rect x="276" y="300" width="10" height="14" fill="#3a6a8a" opacity="0.6" rx="1"/>

  <!-- Person 4 — seated -->
  <ellipse cx="550" cy="290" rx="22" ry="22" fill="#9a9488"/>
  <rect x="532" y="310" width="36" height="40" fill="#7a7468" rx="3"/>

  <!-- Person 5 — asleep at table -->
  <ellipse cx="660" cy="288" rx="22" ry="22" fill="#9a9488"/>
  <rect x="642" y="308" width="36" height="40" fill="#7a7468" rx="3"/>
  <!-- Head resting on table -->
  <ellipse cx="660" cy="316" rx="18" ry="14" fill="#9a9488"/>
  <!-- ZZZ -->
  <text x="682" y="300" font-family="Georgia, serif" font-size="12" fill="#272727" opacity="0.5" font-style="italic">z</text>
  <text x="694" y="288" font-family="Georgia, serif" font-size="16" fill="#272727" opacity="0.4" font-style="italic">z</text>

  <!-- Person 6 — far left -->
  <ellipse cx="90" cy="295" rx="22" ry="22" fill="#9a9488"/>
  <rect x="72" y="315" width="36" height="40" fill="#7a7468" rx="3"/>

  <!-- Meeting materials on table -->
  <!-- Agenda papers -->
  <rect x="310" y="318" width="80" height="50" fill="#f5f0e8" stroke="#c8bda4" stroke-width="0.5" rx="1" transform="rotate(-5 350 343)"/>
  <text x="345" y="338" font-family="monospace" font-size="6" fill="#272727" text-anchor="middle" transform="rotate(-5 350 343)">AGENDA</text>
  <text x="345" y="348" font-family="monospace" font-size="5" fill="#6a5840" text-anchor="middle" transform="rotate(-5 350 343)">1. Alignment (30m)</text>
  <text x="345" y="357" font-family="monospace" font-size="5" fill="#6a5840" text-anchor="middle" transform="rotate(-5 350 343)">2. Synergies (30m)</text>
  <text x="345" y="366" font-family="monospace" font-size="5" fill="#6a5840" text-anchor="middle" transform="rotate(-5 350 343)">3. Next steps (30m)</text>
  <!-- Coffee cups -->
  <rect x="420" y="320" width="20" height="22" fill="#e8e2d8" stroke="#c8bda4" stroke-width="1" rx="2"/>
  <rect x="420" y="320" width="20" height="8" fill="#7a5238" opacity="0.5" rx="2 2 0 0"/>
  <rect x="475" y="315" width="20" height="22" fill="#e8e2d8" stroke="#c8bda4" stroke-width="1" rx="2"/>
  <rect x="475" y="315" width="20" height="8" fill="#7a5238" opacity="0.5" rx="2 2 0 0"/>

  <!-- Meeting room sign -->
  <rect x="20" y="10" width="180" height="30" fill="#272727" rx="2"/>
  <text x="110" y="30" font-family="Georgia, serif" font-size="11" fill="#f5f0e8" text-anchor="middle">FUTURE OF PAYMENTS</text>

  <!-- Caption bar -->
  <rect x="0" y="432" width="820" height="48" fill="#272727" opacity="0.88"/>
  <text x="410" y="461" font-family="Georgia, serif" font-size="13" fill="#f5f0e8" opacity="0.85" text-anchor="middle" font-style="italic">Industry leaders convene. Alignment on next steps expected Q4 at the earliest.</text>
</svg>
