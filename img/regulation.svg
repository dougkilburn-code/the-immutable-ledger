<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#f5f0e8"/>

  <!-- Desk surface -->
  <rect x="0" y="330" width="820" height="150" fill="#d4c9b0"/>
  <rect x="0" y="330" width="820" height="4" fill="#b8ad98"/>

  <!-- Main document stack — enormous pile -->
  <!-- Bottom stack (widest) -->
  <rect x="200" y="220" width="420" height="18" fill="#e8e2d8" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="205" y="202" width="415" height="18" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="202" y="184" width="418" height="18" fill="#e4dfd4" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="208" y="166" width="410" height="18" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="204" y="148" width="416" height="18" fill="#e8e2d8" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="207" y="130" width="412" height="18" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="203" y="112" width="416" height="18" fill="#e4dfd4" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="209" y="94" width="408" height="18" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="205" y="76" width="414" height="18" fill="#e8e2d8" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="211" y="58" width="406" height="18" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5" rx="1"/>
  <rect x="207" y="40" width="412" height="18" fill="#e4dfd4" stroke="#c8bda4" stroke-width="0.5" rx="1"/>

  <!-- Top document — visible with official markings -->
  <rect x="205" y="22" width="414" height="20" fill="#f5f0e8" stroke="#c8bda4" stroke-width="1" rx="1"/>

  <!-- Official seal on top document -->
  <circle cx="250" cy="200" r="28" fill="none" stroke="#8a7858" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="250" cy="200" r="22" fill="none" stroke="#8a7858" stroke-width="1.5"/>
  <text x="250" y="196" font-family="Georgia, serif" font-size="7" fill="#6a5840" text-anchor="middle" font-weight="bold">OFFICIAL</text>
  <text x="250" y="206" font-family="Georgia, serif" font-size="7" fill="#6a5840" text-anchor="middle">STAMP</text>

  <!-- Text lines on top visible document -->
  <rect x="300" y="190" width="280" height="4" fill="#c8bda4" rx="1" opacity="0.6"/>
  <rect x="300" y="200" width="240" height="4" fill="#c8bda4" rx="1" opacity="0.6"/>
  <rect x="300" y="210" width="260" height="4" fill="#c8bda4" rx="1" opacity="0.6"/>

  <!-- Document heading on visible sheet -->
  <rect x="290" y="160" width="200" height="16" fill="#c8bda4" opacity="0.4" rx="1"/>
  <text x="390" y="172" font-family="Georgia, serif" font-size="10" fill="#4a3a28" text-anchor="middle" font-weight="bold">AML/CTF COMPLIANCE</text>
  <text x="390" y="185" font-family="Georgia, serif" font-size="8" fill="#6a5840" text-anchor="middle">DEADLINE EXTENSION REQUEST (FORM 47-B)</text>
  <text x="390" y="196" font-family="Georgia, serif" font-size="7" fill="#8a7858" text-anchor="middle">SUPERSEDES FORM 47-A (ALSO OUTSTANDING)</text>

  <!-- Second smaller pile on the right -->
  <rect x="640" y="268" width="160" height="12" fill="#e8e2d8" stroke="#c8bda4" stroke-width="0.5"/>
  <rect x="644" y="256" width="156" height="12" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5"/>
  <rect x="641" y="244" width="158" height="12" fill="#e4dfd4" stroke="#c8bda4" stroke-width="0.5"/>
  <rect x="645" y="232" width="154" height="12" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5"/>
  <rect x="642" y="220" width="158" height="12" fill="#e8e2d8" stroke="#c8bda4" stroke-width="0.5"/>
  <rect x="646" y="208" width="152" height="12" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5"/>
  <!-- Label on right pile -->
  <text x="720" y="295" font-family="monospace" font-size="8" fill="#8a7858" text-anchor="middle">PENDING REVIEW</text>
  <text x="720" y="307" font-family="monospace" font-size="8" fill="#8a7858" text-anchor="middle">(since 2021)</text>

  <!-- Third pile on the left -->
  <rect x="30" y="280" width="140" height="12" fill="#e8e2d8" stroke="#c8bda4" stroke-width="0.5"/>
  <rect x="34" y="268" width="136" height="12" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5"/>
  <rect x="31" y="256" width="138" height="12" fill="#e4dfd4" stroke="#c8bda4" stroke-width="0.5"/>
  <rect x="35" y="244" width="134" height="12" fill="#ece7dc" stroke="#c8bda4" stroke-width="0.5"/>
  <!-- Label -->
  <text x="100" y="300" font-family="monospace" font-size="8" fill="#8a7858" text-anchor="middle">EXTENSION ON</text>
  <text x="100" y="312" font-family="monospace" font-size="8" fill="#8a7858" text-anchor="middle">THE EXTENSION</text>

  <!-- Rubber stamp and ink pad on desk -->
  <rect x="50" y="318" width="80" height="16" fill="#4a3a28" rx="2"/>
  <rect x="54" y="312" width="72" height="10" fill="#3a2a1a" rx="1"/>
  <rect x="58" y="307" width="64" height="8" fill="#272727" rx="1"/>
  <!-- Ink pad -->
  <rect x="150" y="316" width="60" height="18" fill="#8a0000" opacity="0.7" rx="3"/>
  <rect x="153" y="319" width="54" height="12" fill="#6a0000" opacity="0.8" rx="2"/>

  <!-- Calendar on wall suggestion -->
  <rect x="680" y="60" width="110" height="140" fill="#e8e2d8" stroke="#c8bda4" stroke-width="1" rx="2"/>
  <rect x="680" y="60" width="110" height="24" fill="#8a0000" rx="2 2 0 0"/>
  <text x="735" y="77" font-family="Georgia, serif" font-size="11" fill="#f5f0e8" text-anchor="middle" font-weight="bold">DEADLINE</text>
  <!-- Calendar dates — all crossed out -->
  <text x="700" y="105" font-family="monospace" font-size="10" fill="#272727">1  2  3</text>
  <text x="700" y="120" font-family="monospace" font-size="10" fill="#272727">4  5  6</text>
  <text x="700" y="135" font-family="monospace" font-size="10" fill="#272727">7  8  9</text>
  <text x="700" y="150" font-family="monospace" font-size="10" fill="#272727">10 11 12</text>
  <text x="700" y="165" font-family="monospace" font-size="10" fill="#272727">13 14 15</text>
  <text x="700" y="180" font-family="monospace" font-size="10" fill="#272727">16 17 18</text>
  <!-- Big X through entire calendar -->
  <line x1="685" y1="90" x2="785" y2="195" stroke="#8a0000" stroke-width="3" opacity="0.6"/>
  <line x1="785" y1="90" x2="685" y2="195" stroke="#8a0000" stroke-width="3" opacity="0.6"/>

  <!-- Caption bar -->
  <rect x="0" y="432" width="820" height="48" fill="#272727" opacity="0.88"/>
  <text x="410" y="461" font-family="Georgia, serif" font-size="13" fill="#f5f0e8" opacity="0.85" text-anchor="middle" font-style="italic">The industry has formally requested an extension on the extension. The regulator is reviewing.</text>
</svg>
