<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8d8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="820" height="480" fill="url(#skyGrad)"/>

  <!-- Distant background clouds -->
  <ellipse cx="100" cy="200" rx="80" ry="40" fill="#ffffff" opacity="0.5"/>
  <ellipse cx="150" cy="185" rx="60" ry="35" fill="#ffffff" opacity="0.5"/>
  <ellipse cx="700" cy="220" rx="90" ry="42" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="750" cy="205" rx="70" ry="38" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="740" cy="190" rx="50" ry="30" fill="#ffffff" opacity="0.4"/>

  <!-- LARGE MAIN CLOUD — hero cloud -->
  <!-- Shadow -->
  <ellipse cx="415" cy="275" rx="240" ry="30" fill="#b8c8d8" opacity="0.3"/>
  <!-- Cloud body -->
  <ellipse cx="360" cy="230" rx="160" ry="90" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="460" cy="220" rx="140" ry="100" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="560" cy="238" rx="120" ry="80" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="300" cy="248" rx="100" ry="70" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="410" cy="200" rx="130" ry="80" fill="#ffffff"/>
  <ellipse cx="490" cy="190" rx="110" ry="75" fill="#ffffff"/>
  <!-- Cloud highlights -->
  <ellipse cx="380" cy="195" rx="80" ry="45" fill="#ffffff" opacity="0.6"/>
  <ellipse cx="460" cy="185" rx="70" ry="40" fill="#f0f4f8" opacity="0.4"/>

  <!-- On-premise building INSIDE the cloud (irony) -->
  <!-- Building silhouette visible through cloud -->
  <rect x="355" y="215" width="110" height="65" fill="#8a9aaa" opacity="0.35" rx="2"/>
  <rect x="365" y="205" width="90" height="12" fill="#7a8a9a" opacity="0.35"/>
  <!-- Building windows -->
  <rect x="363" y="222" width="14" height="12" fill="#6a8aaa" opacity="0.3" rx="1"/>
  <rect x="382" y="222" width="14" height="12" fill="#6a8aaa" opacity="0.3" rx="1"/>
  <rect x="401" y="222" width="14" height="12" fill="#6a8aaa" opacity="0.3" rx="1"/>
  <rect x="420" y="222" width="14" height="12" fill="#6a8aaa" opacity="0.3" rx="1"/>
  <rect x="440" y="222" width="14" height="12" fill="#6a8aaa" opacity="0.3" rx="1"/>
  <!-- Label inside cloud -->
  <text x="410" y="258" font-family="monospace" font-size="9" fill="#4a5a6a" opacity="0.6" text-anchor="middle" font-weight="bold">ON-PREMISE WORKLOADS</text>
  <text x="410" y="270" font-family="monospace" font-size="8" fill="#4a5a6a" opacity="0.5" text-anchor="middle">(still here, in the cloud)</text>

  <!-- Arrow going TO the cloud (migration) -->
  <line x1="100" y1="380" x2="270" y2="280" stroke="#272727" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.6"/>
  <polygon points="270,280 255,272 263,285" fill="#272727" opacity="0.6"/>
  <text x="120" y="400" font-family="Georgia, serif" font-size="11" fill="#272727" opacity="0.7" font-style="italic">"Migration well underway"</text>
  <text x="120" y="416" font-family="monospace" font-size="8" fill="#4a6a8a" opacity="0.7">— executive, calling from office</text>

  <!-- Ground — office building visible below -->
  <rect x="0" y="400" width="820" height="80" fill="#c8d8b8"/>
  <rect x="0" y="398" width="820" height="4" fill="#a8c898"/>
  <!-- Building outlines on ground -->
  <rect x="60" y="350" width="80" height="52" fill="#9aaa9a" opacity="0.6" rx="1"/>
  <rect x="160" y="360" width="60" height="42" fill="#9aaa9a" opacity="0.5" rx="1"/>
  <rect x="670" y="345" width="90" height="56" fill="#9aaa9a" opacity="0.6" rx="1"/>
  <!-- Windows on buildings -->
  <rect x="70" y="358" width="12" height="10" fill="#b8d8e8" opacity="0.5"/>
  <rect x="88" y="358" width="12" height="10" fill="#b8d8e8" opacity="0.5"/>
  <rect x="106" y="358" width="12" height="10" fill="#b8d8e8" opacity="0.5"/>
  <rect x="70" y="374" width="12" height="10" fill="#b8d8e8" opacity="0.5"/>
  <rect x="88" y="374" width="12" height="10" fill="#b8d8e8" opacity="0.5"/>
  <rect x="106" y="374" width="12" height="10" fill="#b8d8e8" opacity="0.5"/>
  <!-- "Cloud Services" sign on building -->
  <rect x="680" y="352" width="72" height="14" fill="#4a6a8a" rx="1"/>
  <text x="716" y="363" font-family="monospace" font-size="6.5" fill="#f5f0e8" text-anchor="middle">CLOUD SVCS. DEPT.</text>
  <text x="716" y="395" font-family="monospace" font-size="6.5" fill="#4a5a4a" text-anchor="middle">est. on-premise, 2018</text>

  <!-- Caption bar -->
  <rect x="0" y="432" width="820" height="48" fill="#272727" opacity="0.85"/>
  <text x="410" y="461" font-family="Georgia, serif" font-size="13" fill="#f5f0e8" opacity="0.85" text-anchor="middle" font-style="italic">Cloud migration confirmed. The workloads remain on the ground, watching it migrate.</text>
</svg>
